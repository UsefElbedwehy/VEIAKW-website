name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (hermetic — mock data, local config)
        run: npm run build
        env:
          # Build without live infra: in-memory catalog + seeded default config.
          DATA_SOURCE: mock
          NEXT_PUBLIC_CONFIG_SOURCE: local
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: build-placeholder-service-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
